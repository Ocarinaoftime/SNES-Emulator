name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: make
      run: make
      
  build-macos:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: sdl-cmake
      run: cd SDL;cmake .
    - name: make
      run: make

  build-windows:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: make
      run: make
